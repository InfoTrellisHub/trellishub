<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Login | Trellis</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin-login-body">
  <div class="card admin-login-card">
    <div class="nav-logo" style="justify-content:center; margin-bottom: var(--space-3);">
      <svg width="32" height="32" viewBox="0 0 40 40" aria-hidden="true">
        <rect x="2" y="2" width="36" height="36" rx="10" fill="none" stroke="#1E5BB8" stroke-width="2.5"/>
        <g stroke="#1B7A4D" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="8" x2="12" y2="32"/><line x1="20" y1="8" x2="20" y2="32"/><line x1="28" y1="8" x2="28" y2="32"/>
          <line x1="8" y1="12" x2="32" y2="12"/><line x1="8" y1="20" x2="32" y2="20"/><line x1="8" y1="28" x2="32" y2="28"/>
        </g>
        <circle cx="20" cy="20" r="2.5" fill="#1B7A4D"/>
      </svg>
      Trellis
    </div>
    <h1 style="font-size: var(--text-2xl); text-align:center;">Developer Login</h1>
    <p style="text-align:center;">Internal access only.</p>
    <form id="adminLoginForm" novalidate>
      <div class="field">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" name="password" required autofocus />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
      <div class="form-status" id="adminLoginStatus" role="status"></div>
    </form>
  </div>

  <script src="/assets/js/utils.js" defer></script>
  <script src="/admin/admin-login.js" defer></script>
</body>
</html>
